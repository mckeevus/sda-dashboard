<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDA Dashboard — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #2D1B42 0%, #5C2D8F 50%, #7B3FA0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-dot {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #5C2D8F, #7B3FA0);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 18px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: #1C1C1C;
      line-height: 1.2;
    }

    .logo-sub {
      font-size: 12px;
      color: #888;
      font-weight: 400;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1C1C1C;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #757575;
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #424242;
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #E0E0E0;
      border-radius: 8px;
      font-size: 15px;
      color: #1C1C1C;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: #5C2D8F;
      box-shadow: 0 0 0 3px rgba(92,45,143,0.12);
    }

    .error {
      display: none;
      margin-top: 8px;
      font-size: 13px;
      color: #B71C1C;
      background: #FFEBEE;
      border-radius: 6px;
      padding: 8px 12px;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: linear-gradient(135deg, #5C2D8F, #7B3FA0);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.92; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #F0F0F0;
      font-size: 12px;
      color: #AAAAAA;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-dot">S</div>
      <div>
        <div class="logo-text">SDA Analytics Dashboard</div>
        <div class="logo-sub">Home and Living Capital · NDIA</div>
      </div>
    </div>

    <h1>Sign in</h1>
    <p class="subtitle">Enter the team password to access the dashboard.</p>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autofocus>
    <div class="error" id="error-msg">Incorrect password. Please try again.</div>

    <button id="login-btn" onclick="doLogin()">Sign in</button>

    <div class="footer">NDIA · Home and Living Capital Branch</div>
  </div>

  <script>
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const pw  = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error-msg');

      if (!pw) return;

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      err.style.display = 'none';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = '/';
        } else {
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign in';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (e) {
        err.textContent = 'Connection error. Is the server running?';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    }
  </script>
</body>
</html>
